name: CI

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "refactor/**"
    paths:
      - "src/**"
      - "tests/**"
      - "McpServer.slnx"
      - ".github/workflows/ci.yml"
      - "!**/*.md"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "McpServer.slnx"
      - ".github/workflows/ci.yml"
      - "!**/*.md"

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Restore
        run: dotnet restore McpServer.slnx

      - name: Build
        run: dotnet build McpServer.slnx --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test McpServer.slnx
          --no-build
          --configuration Release
          --logger "trx;LogFileName=results.trx"
          --results-directory ./TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults/*.trx
          retention-days: 7
