name: "CD — Backend API"

on:
  push:
    branches:
      - main
    paths:
      - "src/McpServer.BackendApi/**"
      - "src/McpServer.Shared/**"
      - "src/McpServer.ServiceDefaults/**"
      - ".github/workflows/cd-backend-api.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: "10.x"

jobs:
  deploy:
    name: Build and Deploy Backend API
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: >
          dotnet publish src/McpServer.BackendApi/McpServer.BackendApi.csproj
          --configuration Release
          --output ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_BACKEND_API_APP_NAME }}
          package: ./publish

      - name: Restart App Service
        run: az webapp restart --name ${{ vars.AZURE_BACKEND_API_APP_NAME }} --resource-group ${{ vars.AZURE_RESOURCE_GROUP }}
