# .specify/branch-convention.yml
# Generated by speckit.branch-convention.configure — gitflow preset
# Branch pattern: feature/001-short-name
# Folder pattern:         001-short-name  (spec folders are always flat)

convention:
  branch_pattern: "{type}/{seq}-{kebab}"
  folder_pattern: "{seq}-{kebab}"
  type_prefix:
    feature: "feature"
    bugfix: "fix"
    hotfix: "hotfix"
    refactor: "refactor"
    docs: "docs"
  default_type: "feature"
  seq_padding: 3
  seq_start: 1
  date_format: "YYYYMMDD"
  ticket_pattern: "[A-Z]+-[0-9]+"
  max_length: 60
  separator: "-"
  lowercase: true
